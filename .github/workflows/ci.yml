name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate checked-in OKF bundle
        run: node dist/cli.js validate --okf okf --quiet

      - name: Smoke test scan-mode generation
        run: node dist/cli.js generate --repo . --out /tmp/okfgen-ci-scan --reset --mode scan --quiet
